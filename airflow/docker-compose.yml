services:

  # PostgreSQL database — Airflow's internal database
  # Airflow needs a database to store its own metadata:
  # DAG definitions, task run history, schedules, variables and connections
  # We use Docker Postgres instead of AWS RDS to keep costs low for this project
  # In production at scale, RDS would be the right choice for reliability
  # Data is stored on EC2 disk via the postgres_data volume below
  # Kafka does not need this because it manages its own storage internally
  postgres:
    image: postgres:13
    container_name: airflow_postgres
    environment:
      # Database credentials Airflow will use to connect
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      # Persist Postgres data on EC2 disk so it survives container restarts
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # pg_isready is a built in Postgres utility that checks if the database is accepting connections
      # Docker runs this command every 10 seconds
      # If it fails 5 times in a row, the container is marked unhealthy
      # Dependent services (webserver, scheduler) will not start until this passes
      # This gives Postgres time to fully initialize before Airflow tries to connect
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5


  # Airflow init — one time initialization container
  # This container runs once when you first start Airflow
  # It creates all the database tables Airflow needs and creates your admin login
  # After it completes successfully it exits — it does not stay running
  # The webserver and scheduler then take over
  airflow-init:
    image: apache/airflow:2.8.0
    container_name: airflow_init
    # Do not start until Postgres is healthy and accepting connections
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # LocalExecutor means tasks run locally on this same machine
      # Alternative is CeleryExecutor which distributes tasks to worker nodes
      # LocalExecutor is right for a single EC2 node setup like ours
      AIRFLOW__CORE__EXECUTOR: LocalExecutor

      # Tell Airflow where its Postgres database is
      # Format: dialect+driver://username:password@hostname/database_name
      # @postgres refers to the postgres container name above — Docker resolves this automatically
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow

      # Encryption key for sensitive data stored in Airflow database
      # Empty for now — set a real key in production
      AIRFLOW__CORE__FERNET_KEY: ''

      # Airflow ships with 20+ example DAGs by default
      # Setting this to false keeps your UI clean — only your DAGs appear
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'

    # Two commands run sequentially when this container starts:
    # 1. airflow db init — creates all database tables Airflow needs
    # 2. airflow users create — creates your admin account for the Airflow UI
    command: >
      bash -c "airflow db init &&
               airflow users create
               --username admin
               --password admin
               --firstname Admin
               --lastname User
               --role Admin
               --email admin@example.com"


  # Airflow webserver — the browser UI
  # This is what you open in your browser at http://EC2-IP:8080
  # You use it to monitor DAGs, trigger runs manually, check task logs
  # and manage connections, variables and secrets
  airflow-webserver:
    image: apache/airflow:2.8.0
    container_name: airflow_webserver
    # Do not start until Postgres is healthy
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    volumes:
      # Mount your local dags folder into the container
      # Airflow scans /opt/airflow/dags for DAG files automatically
      - ./dags:/opt/airflow/dags

      # Mount logs folder so task logs are written to EC2 disk
      # Without this, logs disappear when the container restarts
      - ./logs:/opt/airflow/logs

      # Mount your ingestion scripts into the container
      # DAG tasks need to import and run these scripts
      # ../ingestion means go up one level from airflow/ to the project root, then into ingestion/
      # Inside the container they appear at /opt/airflow/ingestion
      - ../ingestion:/opt/airflow/ingestion

    # Expose Airflow UI on port 8080
    # Access it at http://EC2-PUBLIC-IP:8080 in your browser
    ports:
      - "8080:8080"

    # Start the Airflow webserver process
    command: webserver

    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      retries: 3


  # Airflow scheduler — the brain of Airflow
  # This process runs continuously in the background
  # It checks your DAGs every few seconds and triggers tasks when they are due
  # Without the scheduler, your DAGs never run automatically
  airflow-scheduler:
    image: apache/airflow:2.8.0
    container_name: airflow_scheduler
    # Do not start until Postgres is healthy
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ../ingestion:/opt/airflow/ingestion

    # Start the Airflow scheduler process
    command: scheduler


volumes:
  # Named volume for Postgres data
  # Docker creates and manages this folder on EC2 disk
  # Data persists even when containers are stopped or recreated
  # Same concept as kafka_data volume in the Kafka docker-compose
  postgres_data: